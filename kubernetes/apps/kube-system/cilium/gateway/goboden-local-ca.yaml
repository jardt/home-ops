---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/issuer_v1.json
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: goboden-selfsigned
spec:
  selfSigned: {}
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: goboden-local-ca
spec:
  isCA: true
  commonName: goboden-local-ca
  secretName: goboden-local-ca
  duration: 87600h
  renewBefore: 720h
  issuerRef:
    name: goboden-selfsigned
    kind: Issuer
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/issuer_v1.json
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: goboden-local-ca
spec:
  ca:
    secretName: goboden-local-ca
