---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: goboden-local
spec:
  secretName: goboden-local-tls
  commonName: goboden.no
  dnsNames:
    - goboden.no
    - '*.goboden.no'
  issuerRef:
    name: goboden-local-ca
    kind: Issuer
  usages:
    - digital signature
    - key encipherment
    - server auth
