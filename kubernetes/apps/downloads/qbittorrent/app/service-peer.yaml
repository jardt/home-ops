apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-peer
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/controller: qbittorrent
    app.kubernetes.io/instance: qbittorrent
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: bittorrent
      port: 56855
      targetPort: 56855
      protocol: TCP
    - name: bittorrent-udp
      port: 56855
      targetPort: 56855
      protocol: UDP
