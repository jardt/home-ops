# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goboden-platform-admin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      goboden-platform-admin:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: registry.system.svc.cluster.local:5000/goboden-platform-admin
              tag: main
              digest: "sha256:0bfdf5f6c1a564e57d06079575f09b0c8f1c459e414aa9c6f7a90a81a758ce7f" # {"$imagepolicy": "flux-system:goboden-platform-admin:digest"}
            ports:
              - name: http
                containerPort: &port 80
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["platform.goboden.no"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-goboden-wildcard
        rules:
          - backendRefs:
              - identifier: app
                port: *port
