# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goboden-tenant-admin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      goboden-tenant-admin:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: registry.system.svc.cluster.local:5000/goboden-tenant-admin
              tag: main
              digest: "sha256:99d51d52bd5fbdb2266caffb7eb19f96071d640ae7baad0612219556051c1883" # {"$imagepolicy": "flux-system:goboden-tenant-admin:digest"}
            ports:
              - name: http
                containerPort: &port 80
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["*.goboden.no"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-goboden-wildcard
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /admin/
            backendRefs:
              - identifier: app
                port: *port
