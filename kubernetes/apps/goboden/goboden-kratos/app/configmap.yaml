apiVersion: v1
kind: ConfigMap
metadata:
  name: goboden-kratos-config
data:
  kratos.yml: |
    version: v1.1.0

    dsn: $DSN

    serve:
      public:
        base_url: https://auth.goboden.no/
        cors:
          enabled: true
          allow_credentials: true
          allowed_origins:
            - https://goboden.no
            - https://*.goboden.no
            - https://platform.goboden.no
            - https://admin.goboden.no
            - https://app.goboden.no
          allowed_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allowed_headers:
            - Content-Type
            - Authorization
            - Cookie
            - X-CSRF-Token
      admin:
        base_url: http://goboden-kratos:4434/

    selfservice:
      default_browser_return_url: https://app.goboden.no/admin/
      methods:
        password:
          enabled: true
      flows:
        error:
          ui_url: https://app.goboden.no/admin/auth/error
        settings:
          ui_url: https://app.goboden.no/admin/auth/innstillinger
          required_aal: highest_available
        recovery:
          enabled: false
          ui_url: https://app.goboden.no/admin/auth/gjenopprett
        verification:
          enabled: false
          ui_url: https://app.goboden.no/admin/auth/verifiser
        logout:
          after:
            default_browser_return_url: https://goboden.no/
        login:
          ui_url: https://app.goboden.no/admin/auth/logg-inn
        registration:
          ui_url: https://app.goboden.no/admin/auth/registrer
          after:
            password:
              hooks:
                - hook: session

    log:
      level: info
      format: text
      leak_sensitive_values: false

    secrets:
      cookie:
        - $SECRETS_COOKIE
      cipher:
        - $SECRETS_CIPHER

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/kratos/identity.schema.json
  identity.schema.json: |
    {
      "$id": "https://schemas.goboden.local/identity.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Goboden Identity Schema",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "minLength": 3,
              "ory.sh/kratos": {
                "credentials": {
                  "password": {
                    "identifier": true
                  }
                },
                "verification": {
                  "via": "email"
                },
                "recovery": {
                  "via": "email"
                }
              }
            },
            "is_platform_admin": {
              "type": "boolean"
            }
          },
          "required": [
            "email"
          ],
          "additionalProperties": false
        }
      }
    }
