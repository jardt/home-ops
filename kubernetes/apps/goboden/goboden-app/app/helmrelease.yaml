# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goboden-app
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      goboden-app:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: registry.system.svc.cluster.local:5000/goboden-app
              tag: main
              digest: sha256:6ba827a9e3bfc46f6323eff8fbcaa603df66428264c753ecfcdac2399843316d # {"$imagepolicy": "flux-system:goboden-app:digest"}
            env:
              PORT: &port 3000
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["goboden.no"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-goboden
        rules:
          - backendRefs:
              - identifier: app
                port: *port
