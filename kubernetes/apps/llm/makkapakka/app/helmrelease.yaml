# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: makkapakka
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      makkapakka:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 10000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 10000
            runAsUser: 10000
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            args: ["gateway", "run", "--no-supervise"]
            env:
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_MODEL_NAME: makkapakka
              HERMES_HOME: /opt/data
              HOME: /opt/data
              HERMES_DASHBOARD: "true"
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_INSECURE: "true"
              GATEWAY_HEALTH_URL: http://localhost:8642
              TZ: Europe/Oslo
            envFrom:
              - secretRef:
                  name: makkapakka-secret
            ports:
              - containerPort: &gatewayPort 8642
                name: gateway
                protocol: TCP
              - containerPort: &httpPort 9119
                name: http
                protocol: TCP
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      data:
        existingClaim: makkapakka
        advancedMounts:
          makkapakka:
            app:
              - path: /opt/data
    service:
      app:
        ports:
          gateway:
            port: *gatewayPort
          http:
            port: *httpPort
    route:
      app:
        hostnames:
          - "makkapakka.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
