# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goboden-app
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      goboden-app:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: registry.system.svc.cluster.local:5000/goboden-app
              tag: main
              digest: sha256:3e5f64d273139fdab291dfa6d526dd3ebb6586ea2514649ff7245ed3fa3f0f68 # {"$imagepolicy": "flux-system:goboden-app:digest"}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
